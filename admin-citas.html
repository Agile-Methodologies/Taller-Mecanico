<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de administración — Gestión de citas</title>
    <link rel="stylesheet" href="CSS/panel.css">
    <link rel="stylesheet" href="CSS/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<header class="header">
    <nav class="navbar">
        <a href="index.html" class="logo">
            <i class="fa-solid fa-screwdriver-wrench"></i>
            <span>Taller Mecánico</span>
        </a>

        <div class="login-container oculto">
            <a href="login.html" class="btn-login">
                <i class="fa-solid fa-user"></i>
                Iniciar sesión
            </a>
        </div>

        <div class="perfil-container">
            <button class="perfil-btn">
                <i class="fa-solid fa-user-shield"></i>
                <span id="nombre-usuario">Administrador</span>
                <i class="fa-solid fa-chevron-down"></i>
            </button>
            <div class="dropdown">
                <a href="#" id="cerrarSesion">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    Cerrar sesión
                </a>
            </div>
        </div>

        <button class="menu-btn">
            <i class="fa-solid fa-bars"></i>
        </button>
    </nav>
</header>

<main class="contenido-panel contenido-panel-ancho">

  <div class="encabezado-seccion encabezado-flex">
    <div>
      <span class="eyebrow">Panel de administración</span>
      <h1>Gestión de citas</h1>
      <p>Consulta las citas de los clientes, revisa sus notas y actualiza el estado o el review del servicio.</p>
    </div>

    <div class="resumen-admin">
      <div class="tarjeta-resumen">
        <span class="numero" id="contador-total">0</span>
        <span class="etiqueta">Total</span>
      </div>
      <div class="tarjeta-resumen">
        <span class="numero" id="contador-pendientes">0</span>
        <span class="etiqueta">Pendientes</span>
      </div>
      <div class="tarjeta-resumen">
        <span class="numero" id="contador-aceptadas">0</span>
        <span class="etiqueta">Aceptadas</span>
      </div>
      <div class="tarjeta-resumen">
        <span class="numero" id="contador-completadas">0</span>
        <span class="etiqueta">Completadas</span>
      </div>
    </div>
  </div>

  <div class="filtros-admin">
    <div class="campo campo-filtro">
      <label for="filtro-estado">Estado</label>
      <select id="filtro-estado">
        <option value="todos">Todos los estados</option>
        <option value="pendiente">Pendiente</option>
        <option value="confirmada">Aceptada</option>
        <option value="completada">Completada</option>
        <option value="cancelada">Cancelada</option>
      </select>
    </div>

    <div class="campo campo-filtro campo-buscar">
      <label for="buscar-cliente">Buscar cliente</label>
      <input type="text" id="buscar-cliente" placeholder="Nombre o correo del cliente..." />
    </div>
  </div>

  <div id="lista-citas" class="lista-citas-admin"></div>

  <div id="estado-vacio" class="estado-vacio" hidden>
    <strong>Sin resultados</strong>
    <p id="texto-vacio">Todavía no hay citas registradas.</p>
  </div>

</main>

<div id="mensaje" class="mensaje-flotante"></div>

<script src="JS/db.js"></script>
<script src="JS/auth.js"></script>
<script src="JS/header-comun.js"></script>
<script src="JS/admin-citas.js"></script>

</body>
</html>
