<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Taller Mecánico — Recuperar contraseña</title>
  <link rel="stylesheet" href="CSS/style.css"/>
  <style>
    .card-simple {
      background: var(--crema);
      border-radius: var(--radio);
      box-shadow: var(--sombra);
      width: min(460px, 92vw);
      padding: 2.8rem 2.5rem;
      position: relative;
      z-index: 1;
      opacity: 0;
      transform: translateY(18px);
      transition: opacity .45s ease, transform .45s ease;
    }
    .card-simple.visible { opacity:1; transform:translateY(0); }

    .card-icon {
      width: 54px; height: 54px;
      border-radius: 50%;
      background: rgba(193,18,31,0.1);
      display: flex; align-items:center; justify-content:center;
      font-size: 1.5rem;
      margin-bottom: 1.2rem;
    }
    .card-simple h1 { font-size:1.4rem; font-weight:800; color:var(--azul-marino); margin-bottom:.4rem; }
    .card-simple .subtitulo { font-size:.88rem; color:var(--azul-medio); margin-bottom:1.8rem; line-height:1.5; }

    .grupo-campo { margin-bottom:1.2rem; }
    .grupo-campo label { display:block; font-size:.78rem; font-weight:600; color:var(--azul-marino); text-transform:uppercase; letter-spacing:.5px; margin-bottom:.4rem; }
    .grupo-campo input { width:100%; padding:.8rem 1rem; border:2px solid #d6c9b0; border-radius:10px; font-size:.95rem; color:#1a1a2e; background:#fff; outline:none; transition:border-color .25s, box-shadow .25s; }
    .grupo-campo input:focus { border-color:var(--azul-medio); box-shadow:0 0 0 3px rgba(102,155,188,.2); }

    .btn-principal { width:100%; padding:.9rem; background:linear-gradient(135deg,var(--rojo-oscuro),var(--rojo-vivo)); color:#fff; font-size:.95rem; font-weight:700; border:none; border-radius:10px; cursor:pointer; box-shadow:0 6px 20px rgba(193,18,31,.35); transition:transform .25s, box-shadow .25s; margin-top:.3rem; }
    .btn-principal:hover { transform:translateY(-2px); box-shadow:0 10px 28px rgba(193,18,31,.45); }
    .btn-principal:disabled { opacity:.65; cursor:not-allowed; }

    .btn-secundario { width:100%; padding:.85rem; background:transparent; color:var(--azul-marino); font-size:.9rem; font-weight:600; border:2px solid var(--azul-marino); border-radius:10px; cursor:pointer; transition:background .2s, color .2s; margin-top:.8rem; }
    .btn-secundario:hover { background:var(--azul-marino); color:#fff; }

    .enlace-volver { display:block; text-align:center; margin-top:1.2rem; font-size:.82rem; color:var(--azul-medio); text-decoration:none; }
    .enlace-volver:hover { color:var(--rojo-vivo); }

    .mensaje { margin-top:1rem; padding:.7rem 1rem; border-radius:8px; font-size:.85rem; font-weight:500; min-height:2.2rem; text-align:center; }
    .mensaje.error  { background:rgba(193,18,31,.1); color:var(--rojo-vivo); border:1px solid rgba(193,18,31,.25); }
    .mensaje.exito  { background:rgba(0,48,73,.1); color:var(--azul-marino); border:1px solid rgba(0,48,73,.25); }

    /* Pantalla de confirmación */
    .confirmacion { display:none; text-align:center; }
    .confirmacion.visible { display:block; }
    .formulario-recuperar.oculto { display:none; }

    .confirm-icon { font-size:2.5rem; margin-bottom:1rem; }
    .confirmacion h2 { font-size:1.2rem; font-weight:700; color:var(--azul-marino); margin-bottom:.5rem; }
    .confirmacion p  { font-size:.88rem; color:var(--azul-medio); line-height:1.6; margin-bottom:1.5rem; }
  </style>
</head>
<body>

  <div class="card-simple" id="card">

    <!-- Formulario de recuperación -->
    <div class="formulario-recuperar" id="formulario-recuperar">
      <div class="card-icon">🔑</div>
      <h1>Obtener enlace cambio contraseña</h1>
      <p class="subtitulo">Ingresa el correo asociado a tu cuenta y te enviaremos un enlace para restablecer tu contraseña.</p>

      <form id="form-recuperar" novalidate>
        <div class="grupo-campo">
          <label for="email-recuperar">Correo electrónico</label>
          <input type="email" id="email-recuperar" placeholder="usuario@taller.com" required/>
        </div>
        <div id="mensaje-recuperar" class="mensaje"></div>
        <button type="submit" id="btn-enviar" class="btn-principal">Enviar enlace</button>
      </form>

      <a href="index.html" class="enlace-volver">← Volver al login</a>
    </div>

    <!-- Confirmación -->
    <div class="confirmacion" id="confirmacion">
      <div class="confirm-icon">ℹ️</div>
      <h2>Obtener enlace cambio contraseña</h2>
      <p>Se ha enviado un enlace de recuperación de cuenta al correo registrado.</p>
      <a href="index.html" class="btn-secundario" style="display:block;text-align:center;text-decoration:none;padding:.85rem;border:2px solid var(--azul-marino);border-radius:10px;color:var(--azul-marino);font-weight:600;font-size:.9rem;">
        Volver al login
      </a>
    </div>

  </div>

  <script src="JS/db.js"></script>
  <script>
    let dbConexion = null;

    document.addEventListener("DOMContentLoaded", async () => {
      document.getElementById("card").classList.add("visible");

      const form    = document.getElementById("form-recuperar");
      const btnEnv  = document.getElementById("btn-enviar");
      const msgEl   = document.getElementById("mensaje-recuperar");
      const inputEl = document.getElementById("email-recuperar");

      // Conectar BD 
      try {
        dbConexion = await abrirBaseDatos();
        console.info("✔ BD conectada en recuperar.html");
      } catch(e) {
        mostrar(msgEl, "No se pudo conectar a la base de datos.", "error");
        btnEnv.disabled = true;
        console.error("BD error:", e);
        return; // detener ejecución si no hay BD
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const email = inputEl.value.trim().toLowerCase();

        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          mostrar(msgEl, "Ingresa un correo válido.", "error");
          return;
        }

        // Verificar conexión
        if (!dbConexion) {
          mostrar(msgEl, "Sin conexión a la base de datos.", "error");
          return;
        }

        btnEnv.disabled    = true;
        btnEnv.textContent = "Verificando...";
        mostrar(msgEl, "", "");

        try {
          const usuario = await buscarUsuarioPorEmail(dbConexion, email);

          if (!usuario) {
            mostrar(msgEl, "Ese correo no está registrado en el sistema.", "error");
            btnEnv.disabled    = false;
            btnEnv.textContent = "Enviar enlace";
            return;
          }

          // Mostrar confirmación si el email existe
          document.getElementById("formulario-recuperar").classList.add("oculto");
          document.getElementById("confirmacion").classList.add("visible");

        } catch(err) {
          console.error("Error búsqueda:", err);
          mostrar(msgEl, "Error al buscar el correo: " + (err.message || err), "error");
          btnEnv.disabled    = false;
          btnEnv.textContent = "Enviar enlace";
        }
      });
    });

    function mostrar(el, texto, tipo) {
      el.textContent = texto;
      el.className   = "mensaje " + (tipo || "");
    }
  </script>
</body>
</html>
